name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install core + dev + quality deps
        run: |
          pip install -e ".[dev,quality]"

      - name: Lint (ruff)
        run: ruff check agents/ bench/ pipeline/ scripts/ tests/

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # Separate job: langgraph optional import
  test-langgraph:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install with langgraph
        run: pip install -e ".[langgraph,dev]"

      - name: Run tests with langgraph available
        run: pytest tests/ -v --tb=short
